# dsfranka teleop configuration (shared by sim and real robot)

# robot type: fr3 | panda — selects the MuJoCo model (and thus IK joint limits).
# keep in sync with the C++ bridge build option -DDSFRANKA_ROBOT (see cpp/README.md)
robot: fr3

control:
  rate_hz: 50            # teleop tick rate (target integration + IK)
  physics_substeps: auto # sim only: derived from model timestep

speed:
  xy: 0.25               # m/s at full left-stick deflection
  z: 0.20                # m/s at full right-stick deflection (z height)
  yaw: 1.0               # rad/s for L1/R1 yaw
  gripper: 0.20          # m/s equivalent width rate at full trigger (full stroke ~0.4 s)
  auto_xyz: 0.50         # m/s cruise speed for machine-generated moves (homing/descend)
  auto_rot: 1.8          # rad/s for machine-generated rotations (tilt/orientation reset)

accel:                   # target-side acceleration limits -> smooth velocity ramps
  xyz: 1.0               # m/s^2 (stick response ramp + auto-move trapezoidal arrival)
  yaw: 4.0               # rad/s^2

gamepad:
  deadzone: 0.08
  # sign convention: +lx -> +y_world, +ly(up) -> +x_world (tune to taste)
  invert_ly: true
  invert_ry: true

workspace:               # target-pose clamp box, base frame [m]
  x: [0.20, 0.70]
  y: [-0.40, 0.40]
  z: [0.03, 0.70]

features:
  descend_z: 0.12        # auto-descend target height [m] (R3 button)

tilt:                    # Cross = +step / hold-increase, Circle = -step / hold-return
  step_deg: 30
  max_deg: 90
  hold_speed_deg: 40     # continuous tilt rate while holding [deg/s]
  hold_threshold_s: 0.35 # press shorter than this = tap (snap step), longer = hold
  invert_ud: true        # swap which of up/down steps the ud component positive
  invert_lr: true        # swap which of left/right steps the lr component positive
  axes:                  # world-frame rotation axis per tilt component
    ud: [0, -1, 0]       # up/down component (+ tips toward +x before inversion)
    lr: [1, 0, 0]        # left/right component (+ tips toward +y before inversion)

home:
  # matches the "home" keyframe of the menagerie panda model
  qpos: [0.0, 0.0, 0.0, -1.57079, 0.0, 1.57079, -0.7853]

ik:
  pos_gain: 5.0          # target-error -> velocity gain
  rot_gain: 5.0
  damping: 1.0e-4        # DLS lambda
  nullspace_gain: 0.25   # posture bias (high values jerk the elbow around)
  max_lin_vel: 0.6       # m/s task-space velocity clamp
  max_ang_vel: 2.0       # rad/s
  max_joint_vel: 1.2     # rad/s clamp on IK output
  cmd_lag_limit: 0.15    # rad, anti-windup: max lead of command over measured q

recorder:
  out_dir: data/episodes
